# 禁用Jekyll处理
theme: null
plugins: []
exclude: []

# 确保所有文件都被处理
safe: false

# 禁用自动页面生成
future: false
unpublished: false
draft: false

# 明确包含所有文件
include:
  - ".nojekyll"
  - "**/*.html"
  - "**/*.htm"
  - "**/*.md"
  - "**/*.txt"
  - "**/*.js"
  - "**/*.css"
  - "**/*.jpg"
  - "**/*.png"
  - "reader/"
  - "reader/index.html"
  - "reader/.nojekyll"
  - "content/"
  - "content/**/*"